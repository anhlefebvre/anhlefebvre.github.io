<!-- _includes/sidebar.html -->
<div class="sidebar">
  {% if site.logo %}
    <img src="{{ site.logo | relative_url }}" class="logo" alt="{{ site.title }} logo">
  {% endif %}

  <h1 class="site-title">{{ site.title }}</h1>

  {% if site.description %}
    <p class="site-description">{{ site.description }}</p>
  {% endif %}

  {% if site.github and site.github.owner_url %}
    <p><a href="{{ site.github.owner_url }}">View My GitHub Profile</a></p>
  {% endif %}

  <!-- Custom block -->
  <hr>
  <h3>Contact</h3>
  <ul style="list-style:none; padding-left:0;">
    <li><a href="mailto:your.email@domain.com">anhlefebvre@protonmail.ch</a></li>
    <li><a href="https://www.linkedin.com/anhlefebvre">LinkedIn</a></li>
  </ul>
</div>
